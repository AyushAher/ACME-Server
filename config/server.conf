host=0.0.0.0
port=18080
# Must be reachable from nginx on the domain host (not 127.0.0.1 when proxying from another machine).
base_url=http://192.168.1.43:18080
data_dir=./data
storage_backend=postgres
eab_mappings_file=./data/eab_mappings.csv
accounts_file=./data/acme_accounts.tsv
nonces_file=./data/nonces.txt
postgres_connection_string=host=192.168.1.119 port=5432 dbname=acme user=postgres password=crypto_user@123
# postgres_connection_string=host=localhost port=63383 dbname=acme user=postgres password=postgres@123
ca_backend=openssl

# Optional webroot publish for non-proxy upstream CAs. LetsEncrypt and ZeroSSL use http01 proxy instead.
http01_challenge_webroot=/var/lib/certbot/unused

openssl_ca_name=OpenSSL-Aerovia
openssl_intermediate_dir=/var/lib/pki/openssl-ca/intermediate-ca
openssl_chain_file=/var/lib/pki/openssl-ca/intermediate-ca/certs/ca-chain.crt
openssl_valid_days=90

ejbca_base_url=https://localhost:8443
ejbca_ca_name=EJBCA-Community
ejbca_client_pkcs12_path=/path/to/superadmin.p12
ejbca_client_pkcs12_password=changeit
ejbca_insecure_skip_tls_verify=true
