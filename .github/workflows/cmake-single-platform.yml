name: CMake CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------
      # Ubuntu dependencies
      # ---------------------------------------
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev \
            libpq-dev

      # ---------------------------------------
      # macOS dependencies
      # ---------------------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install openssl libpq

          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "LIBPQ_ROOT=$(brew --prefix libpq)" >> $GITHUB_ENV

      # ---------------------------------------
      # Windows dependencies
      # ---------------------------------------
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install PostgreSQL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install postgresql --yes

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Build
        run: |
          cmake --build build --config Release --parallel
        shell: bash

      - name: Run Tests
        run: |
          ctest --test-dir build --output-on-failure -C Release
        shell: bash